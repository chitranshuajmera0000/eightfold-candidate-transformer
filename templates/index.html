<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate ETL Pipeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #3b82f6;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success-color: #10b981;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card {
            background-color: var(--surface-color);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .upload-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .file-input-wrapper {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
        }
        .file-input-wrapper:hover {
            border-color: var(--primary-color);
            background: rgba(59, 130, 246, 0.05);
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .file-input-wrapper label {
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
        }
        .file-name {
            font-size: 0.85rem;
            color: var(--success-color);
            margin-top: 8px;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .clear-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .clear-btn:hover {
            background: #ef4444;
            color: white;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #2563eb;
        }
        .btn:disabled {
            background-color: var(--border-color);
            cursor: not-allowed;
        }
        .candidate-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-left: 4px solid var(--primary-color);
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .tag {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-right: 8px;
            margin-bottom: 8px;
            display: inline-block;
        }
        .confidence {
            font-size: 0.9rem;
            color: var(--success-color);
            font-weight: 600;
        }
        pre {
            background: #000;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.85rem;
            color: #a7f3d0;
        }
        #results {
            display: none;
        }
        .view-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .toggle-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Candidate ETL Pipeline</h1>
            <p style="color: var(--text-muted)">Upload structured and unstructured sources to generate canonical profiles.</p>
        </header>

        <form id="uploadForm" class="card">
            <div class="upload-grid">
                <div class="file-input-wrapper">
                    <label>CSV Export</label>
                    <div style="font-size: 24px; margin-bottom:10px;">📊</div>
                    <span style="font-size:0.8rem; color:var(--text-muted)">.csv</span>
                    <input type="file" name="csv_file" accept=".csv" id="csv_input" onchange="updateFileName(this)">
                    <div class="file-name"><span class="text"></span><button type="button" class="clear-btn" onclick="clearFile('csv_input')">✕</button></div>
                </div>
                <div class="file-input-wrapper">
                    <label>ATS JSON</label>
                    <div style="font-size: 24px; margin-bottom:10px;">📋</div>
                    <span style="font-size:0.8rem; color:var(--text-muted)">.json</span>
                    <input type="file" name="ats_file" accept=".json" id="ats_input" onchange="updateFileName(this)">
                    <div class="file-name"><span class="text"></span><button type="button" class="clear-btn" onclick="clearFile('ats_input')">✕</button></div>
                </div>
                <div class="file-input-wrapper">
                    <label>LinkedIn JSON</label>
                    <div style="font-size: 24px; margin-bottom:10px;">💼</div>
                    <span style="font-size:0.8rem; color:var(--text-muted)">.json</span>
                    <input type="file" name="linkedin_file" accept=".json" id="linkedin_input" onchange="updateFileName(this)">
                    <div class="file-name"><span class="text"></span><button type="button" class="clear-btn" onclick="clearFile('linkedin_input')">✕</button></div>
                </div>
                <div class="file-input-wrapper">
                    <label>GitHub JSON</label>
                    <div style="font-size: 24px; margin-bottom:10px;">💻</div>
                    <span style="font-size:0.8rem; color:var(--text-muted)">.json</span>
                    <input type="file" name="github_file" accept=".json" id="github_input" onchange="updateFileName(this)">
                    <div class="file-name"><span class="text"></span><button type="button" class="clear-btn" onclick="clearFile('github_input')">✕</button></div>
                </div>
                <div class="file-input-wrapper">
                    <label>Recruiter Notes</label>
                    <div style="font-size: 24px; margin-bottom:10px;">📝</div>
                    <span style="font-size:0.8rem; color:var(--text-muted)">Multiple .txt files</span>
                    <input type="file" name="notes_files" accept=".txt" multiple id="notes_input" onchange="updateFileName(this, true)">
                    <div class="file-name"><span class="text"></span><button type="button" class="clear-btn" onclick="clearFile('notes_input')">✕</button></div>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="btn">Run ETL Pipeline ✨</button>
        </form>

        <div id="results" style="display: none;">
            <div class="flex-between" style="align-items: center; margin-top: 40px; margin-bottom: 20px;">
                <h2 style="margin: 0;">Processed Candidates</h2>
            </div>
            
            <div id="candidatesList"></div>
        </div>
    </div>

    <script>
        function updateFileName(input, multiple = false) {
            const fileNameDiv = input.parentElement.querySelector('.file-name .text');
            const clearBtn = input.parentElement.querySelector('.clear-btn');
            
            if (input.files.length > 0) {
                if (!multiple && input.accept === ".json") {
                    const file = input.files[0];
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const data = JSON.parse(e.target.result);
                            const firstObj = Array.isArray(data) ? data[0] : data;
                            let valid = true;
                            let errMsg = "";
                            
                            if (input.id === 'github_input' && firstObj && !firstObj.hasOwnProperty('login')) {
                                valid = false; errMsg = "Looks like this isn't a GitHub JSON (missing 'login' property).";
                            }
                            if (input.id === 'linkedin_input' && firstObj && !firstObj.hasOwnProperty('firstName')) {
                                valid = false; errMsg = "Looks like this isn't a LinkedIn JSON (missing 'firstName' property).";
                            }
                            if (input.id === 'ats_input' && firstObj && !firstObj.hasOwnProperty('full_name')) {
                                valid = false; errMsg = "Looks like this isn't an ATS JSON (missing 'full_name' property).";
                            }
                            
                            if (!valid) {
                                alert(`Upload Error:\n${errMsg}`);
                                clearFile(input.id);
                                return;
                            }
                        } catch(err) {
                            alert("Error parsing JSON file.");
                            clearFile(input.id);
                            return;
                        }
                    };
                    reader.readAsText(file);
                }

                if (multiple) {
                    fileNameDiv.textContent = `${input.files.length} files selected`;
                } else {
                    fileNameDiv.textContent = input.files[0].name;
                }
                clearBtn.style.display = 'flex';
                input.parentElement.style.borderColor = 'var(--success-color)';
            } else {
                fileNameDiv.textContent = '';
                clearBtn.style.display = 'none';
                input.parentElement.style.borderColor = 'var(--border-color)';
            }
        }
        
        function clearFile(inputId) {
            const input = document.getElementById(inputId);
            input.value = '';
            updateFileName(input, input.multiple);
        }

        function toggleCandidateJson(id) {
            const el = document.getElementById('json-' + id);
            if (el) {
                el.style.display = el.style.display === 'none' ? 'block' : 'none';
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Processing Pipeline... ⏳';
            
            const formData = new FormData(e.target);
            
            try {
                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    renderCandidates(result.data);
                    document.getElementById('results').style.display = 'block';
                } else {
                    alert('Pipeline Error:\n' + (result.logs || result.error));
                }
            } catch (error) {
                alert('Network Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Run ETL Pipeline ✨';
            }
        });
        
        function renderCandidates(candidates) {
            const container = document.getElementById('candidatesList');
            container.innerHTML = '';
            
            candidates.forEach(c => {
                const skills = c.skills.map(s => `<span class="tag">${s.name}</span>`).join('');
                
                let linksHtml = '';
                if (c.links) {
                    if (c.links.linkedin) linksHtml += `<a href="${c.links.linkedin}" target="_blank" style="color:var(--primary-color); margin-right:10px;">LinkedIn</a>`;
                    if (c.links.github) linksHtml += `<a href="${c.links.github}" target="_blank" style="color:var(--primary-color); margin-right:10px;">GitHub</a>`;
                    if (c.links.portfolio) linksHtml += `<a href="${c.links.portfolio}" target="_blank" style="color:var(--primary-color);">Portfolio</a>`;
                }
                
                let exp = '';
                if (c.experience.length > 0) {
                    const title = c.experience[0].title;
                    const company = c.experience[0].company;
                    if (title && title.toLowerCase() !== 'unknown') {
                        exp = `${title} at ${company || 'Unknown Company'}`;
                    } else if (company) {
                        exp = `${company}`;
                    }
                }
                
                if (c.years_experience) {
                    exp = exp ? `${exp} • ${c.years_experience} Years Exp` : `${c.years_experience} Years Experience`;
                }
                
                if (!exp) {
                    exp = 'No experience listed';
                }

                const phoneStr = c.phones && c.phones.length > 0 ? c.phones[0] : 'N/A';
                const locStr = c.location && c.location.city ? c.location.city : 'N/A';

                const html = `
                    <div class="card candidate-card">
                        <div class="flex-between">
                            <div>
                                <h3 style="margin:0 0 8px 0">${c.full_name || 'Unknown Candidate'}</h3>
                                <p style="margin:0 0 16px 0; color:var(--text-muted)">${c.headline || exp}</p>
                            </div>
                            <div class="confidence">
                                ${(c.overall_confidence * 100).toFixed(0)}% Match Confidence
                            </div>
                        </div>
                        <div style="margin-bottom: 16px;">
                            ${skills}
                        </div>
                        <div style="font-size: 0.9rem;">
                            <strong>Email:</strong> ${c.emails.length > 0 ? c.emails[0] : 'N/A'} | 
                            <strong>Phone:</strong> ${phoneStr} | 
                            <strong>Location:</strong> ${locStr}
                        </div>
                        <div class="flex-between" style="margin-top: 12px; font-size:0.9rem; align-items: center;">
                            <div>${linksHtml}</div>
                            <button type="button" onclick="toggleCandidateJson('${c.candidate_id}')" style="background:none; border:none; color:var(--primary-color); cursor:pointer; font-size:0.8rem; font-weight:600;">{ } View JSON</button>
                        </div>
                        <pre id="json-${c.candidate_id}" style="display:none; font-size:0.75rem; margin-top:16px; overflow-x:auto;">${JSON.stringify(c, null, 2)}</pre>
                    </div>
                `;
                container.innerHTML += html;
            });
        }
    </script>
</body>
</html>
